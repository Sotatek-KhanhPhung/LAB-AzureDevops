trigger:
  branches:
    include:
      - main
  paths:
    include:
      - server.js
      - app/*
      - package.json
      - package-lock.json
      - Dockerfile

pool:
  name: default

variables:
  azureSubscription: 'service-connection-as'
  acrServiceConnection: 'service-connection-acr'
  acrLoginServer: 'acrthreetierlab.azurecr.io'
  imageRepository: 'lab14-backend'
  imageTag: '$(Build.BuildId)'
  webAppName: 'be-three-tier-as'

stages:
- stage: BuildPush
  jobs:
  - job: BuildAndPushImage
    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build and Push image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: Dockerfile
        containerRegistry: $(acrServiceConnection)
        tags: |
          $(imageTag)
          latest

- stage: Deploy
  dependsOn: BuildPush
  jobs:
  - job: DeployToAppService
    steps:
    - task: AzureWebAppContainer@1
      displayName: Deploy image to App Service
      inputs:
        azureSubscription: $(azureSubscription)
        appName: $(webAppName)
        containers: '$(acrLoginServer)/$(imageRepository):$(imageTag)'